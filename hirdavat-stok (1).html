<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-title" content="HırdavatPRO"/>
<meta name="theme-color" content="#001f5b"/>
<meta name="description" content="Hırdavat Dükkanı Stok Yönetim Sistemi"/>
<title>HırdavatPRO</title>
<link rel="manifest" href="manifest.json"/>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=DM+Mono:wght@500&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:'DM Sans',system-ui,sans-serif;background:#00153a;color:#e8eaf0;min-height:100vh;overscroll-behavior:none}
::-webkit-scrollbar{width:3px;height:3px}
::-webkit-scrollbar-track{background:#001230}
::-webkit-scrollbar-thumb{background:#ffd700;border-radius:2px}
input,select,button{font-family:inherit;outline:none;border:none}
button{cursor:pointer}
.mono{font-family:'DM Mono',monospace}

/* Layout */
header{background:linear-gradient(135deg,#001f5b,#002d8a);border-bottom:2px solid #ffd700;padding:12px 16px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:40}
.logo{width:34px;height:34px;background:#ffd700;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:700;color:#001f5b}
.header-info{margin-left:10px}
.header-info h1{font-size:13px;font-weight:700;color:#ffd700;line-height:1.2}
.header-info p{font-size:11px;color:#8899cc}
.header-left{display:flex;align-items:center}
.header-right{display:flex;gap:8px;align-items:center}
.btn-barkod-tara{background:#ffd700;color:#001f5b;font-size:12px;font-weight:700;padding:7px 12px;border-radius:10px}
.btn-uyari{background:rgba(200,0,0,0.3);border:1px solid rgba(255,80,80,0.4);color:#ff8888;font-size:12px;padding:7px 10px;border-radius:10px}

/* Stats */
.stats{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;padding:12px 16px 8px}
.stat-card{background:#001845;border:1px solid #003080;border-radius:12px;padding:12px}
.stat-icon{font-size:18px;margin-bottom:4px}
.stat-val{font-weight:700;font-size:13px;color:#ffd700}
.stat-val.danger{color:#ff6b6b}
.stat-val.green{color:#4ade80}
.stat-label{font-size:10px;color:#6677aa}

/* Tabs */
.tabs{background:#001640;border-bottom:1px solid #002060;display:flex;padding:0 8px;gap:2px;overflow-x:auto;position:sticky;top:57px;z-index:30}
.tabs::-webkit-scrollbar{display:none}
.tab{font-size:11px;font-weight:500;padding:10px 8px;border-bottom:2px solid transparent;color:#6677aa;white-space:nowrap;background:none;transition:all .2s}
.tab.active{color:#ffd700;border-color:#ffd700}

main{flex:1;padding-bottom:24px}

/* Toolbar */
.toolbar{padding:10px 16px 6px;display:flex;gap:8px}
.search-input{flex:1;background:#001845;border:1px solid #003080;border-radius:12px;padding:10px 12px;font-size:13px;color:#e8eaf0}
.search-input::placeholder{color:#445588}
.search-input:focus{border-color:#ffd700}
.cats{display:flex;gap:6px;padding:0 16px 10px;overflow-x:auto}
.cats::-webkit-scrollbar{display:none}
.cat-btn{font-size:11px;padding:5px 12px;border-radius:20px;border:1px solid #003080;background:#001845;color:#8899cc;white-space:nowrap;transition:all .2s}
.cat-btn.active{background:#ffd700;color:#001f5b;border-color:#ffd700;font-weight:700}
.list-header{padding:2px 16px 8px;display:flex;justify-content:space-between;align-items:center}
.list-header span{font-size:11px;color:#6677aa}
.list-header span b{color:#ffd700}
.btn-ekle{background:#ffd700;color:#001f5b;font-size:12px;font-weight:700;padding:6px 12px;border-radius:8px}

/* Ürün kartları */
.urun-kart{margin:0 16px 8px;background:#001845;border:1px solid #003080;border-radius:14px;padding:14px;cursor:pointer;transition:background .15s}
.urun-kart:active{background:#002060}
.urun-kart.dusuk{border-color:#7f1d1d;background:#1a0a0a}
.urun-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px}
.urun-ad{font-weight:600;font-size:13px;color:#e8eaf0;line-height:1.3}
.urun-barkod{font-size:11px;color:#445588;margin-top:2px}
.urun-fiyat{font-weight:700;font-size:13px;color:#ffd700;text-align:right;white-space:nowrap}
.urun-fiyat span{font-weight:400;font-size:11px;color:#6677aa}
.urun-kar{font-size:11px;color:#4ade80;text-align:right}
.urun-bottom{display:flex;align-items:center;justify-content:space-between}
.badges{display:flex;gap:6px;flex-wrap:wrap;align-items:center}
.badge{font-size:11px;padding:2px 8px;border-radius:20px;font-weight:500}
.badge-gray{background:#002060;color:#8899cc}
.badge-red{background:rgba(127,29,29,0.6);color:#fca5a5;border:1px solid rgba(127,29,29,0.4)}
.badge-green{background:rgba(6,78,59,0.6);color:#6ee7b7;border:1px solid rgba(6,78,59,0.4)}
.badge-yellow{background:rgba(120,90,0,0.6);color:#ffd700;border:1px solid rgba(180,140,0,0.4)}
.urun-stok-area{display:flex;align-items:center;gap:6px}
.btn-barkod-icon{background:none;border:1px solid #003080;color:#6677aa;font-size:13px;padding:3px 8px;border-radius:8px}
.urun-stok{font-weight:700;font-size:13px;color:#e8eaf0}
.urun-stok-min{font-size:11px;color:#6677aa}
.urun-aciklama{font-size:11px;color:#334466;margin-top:6px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.empty{text-align:center;padding:60px 20px;color:#334466}
.empty-icon{font-size:40px;margin-bottom:12px}

/* Satis */
.satis-form{margin:16px;background:#001845;border:1px solid #003080;border-radius:16px;padding:16px}
.satis-form h3{font-weight:700;font-size:13px;color:#ffd700;margin-bottom:14px}
.tutar-box{background:#002060;border-radius:10px;padding:10px 12px;margin-bottom:12px;font-size:13px;color:#ffd700;font-weight:700}
.btn-satis{background:#ffd700;color:#001f5b;width:100%;padding:13px;border-radius:12px;font-weight:700;font-size:14px}
.satis-tip-row{display:flex;gap:8px;margin-bottom:12px}
.satis-tip-btn{flex:1;padding:8px 4px;border-radius:10px;border:1px solid #003080;background:#001230;color:#8899cc;font-size:12px;font-weight:500;text-align:center;transition:all .2s}
.satis-tip-btn.active{border-color:#ffd700;color:#ffd700;background:#002060}

/* Rapor */
.rapor-kart{margin:0 16px 10px;background:#001845;border:1px solid #003080;border-radius:14px;padding:14px}
.rapor-baslik{font-size:11px;font-weight:600;color:#ffd700;margin-bottom:10px;text-transform:uppercase;letter-spacing:1px}
.rapor-row{display:flex;justify-content:space-between;align-items:center;padding:6px 0;border-bottom:1px solid #002060}
.rapor-row:last-child{border-bottom:none}
.rapor-label{font-size:12px;color:#8899cc}
.rapor-val{font-size:13px;font-weight:700;color:#e8eaf0}
.rapor-val.green{color:#4ade80}
.rapor-val.yellow{color:#ffd700}

/* Veresiye */
.veresiye-kart{margin:0 16px 8px;background:#001845;border:1px solid #003080;border-radius:12px;padding:12px 14px;cursor:pointer}
.veresiye-kart.odenmedi{border-color:#7f1d1d}
.veresiye-ad{font-weight:600;font-size:13px;color:#e8eaf0}
.veresiye-tarih{font-size:11px;color:#6677aa;margin-top:2px}
.veresiye-tutar{font-weight:700;font-size:14px;color:#ff8888}
.veresiye-tutar.odendi{color:#4ade80}

/* Sayım */
.sayim-kart{margin:0 16px 8px;background:#001845;border:1px solid #003080;border-radius:12px;padding:12px 14px;display:flex;align-items:center;gap:10px}
.sayim-ad{flex:1;font-size:13px;color:#e8eaf0;font-weight:500}
.sayim-input{width:70px;background:#002060;border:1px solid #003080;border-radius:8px;padding:6px 8px;color:#ffd700;font-size:14px;font-weight:700;text-align:center}
.sayim-mevcut{font-size:11px;color:#6677aa;white-space:nowrap}

/* Gecmis */
.gecmis-header{display:flex;justify-content:space-between;align-items:center;padding:16px 16px 10px}
.gecmis-header h3{font-weight:700;font-size:13px;color:#ffd700}
.satis-kart{margin:0 16px 8px;background:#001845;border:1px solid #003080;border-radius:12px;padding:12px 14px;display:flex;justify-content:space-between;align-items:center}
.satis-ad{font-weight:600;font-size:13px;color:#e8eaf0}
.satis-tarih{font-size:11px;color:#6677aa;margin-top:2px}
.satis-tutar{font-weight:700;font-size:13px;color:#ffd700;text-align:right}
.satis-detay{font-size:11px;color:#6677aa;margin-top:2px;text-align:right}
.satis-tip-badge{font-size:10px;padding:1px 6px;border-radius:10px;font-weight:600;margin-top:2px;display:inline-block}
.tip-nakit{background:rgba(74,222,128,0.2);color:#4ade80}
.tip-pos{background:rgba(96,165,250,0.2);color:#60a5fa}
.tip-veresiye{background:rgba(251,146,60,0.2);color:#fb923c}

/* Uyari */
.uyari-header{display:flex;align-items:center;gap:8px;padding:16px 16px 10px}
.pulse{width:8px;height:8px;border-radius:50%;background:#ef4444;animation:pulse 1.5s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.uyari-kart{margin:0 16px 8px;background:#1a0a0a;border:1px solid #7f1d1d;border-radius:12px;padding:14px;cursor:pointer}
.progress-bar{height:6px;background:#002060;border-radius:3px;overflow:hidden}
.progress-fill{height:100%;background:#ef4444;border-radius:3px}

/* AI */
.ai-box{margin:16px;background:linear-gradient(135deg,#001f5b,#00153a);border:1px solid #ffd700;border-radius:16px;padding:16px}
.ai-logo{width:28px;height:28px;background:#ffd700;border-radius:8px;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:12px;color:#001f5b}
.quick-btn{font-size:11px;padding:5px 10px;border-radius:20px;background:#001845;border:1px solid #003080;color:#8899cc;cursor:pointer}
.ai-input{flex:1;background:#001845;border:1px solid #003080;border-radius:12px;padding:10px 12px;font-size:13px;color:#e8eaf0}
.ai-input::placeholder{color:#445588}
.ai-input:focus{border-color:#ffd700}
.btn-ai-gonder{background:#ffd700;color:#001f5b;font-weight:700;font-size:14px;padding:10px 16px;border-radius:12px}
.ai-yanit{margin:0 16px;background:#001845;border:1px solid #003080;border-radius:16px;padding:14px}
.ai-loading{margin:0 16px;background:#001845;border:1px solid #003080;border-radius:16px;padding:14px;display:flex;align-items:center;gap:10px}
.dot{width:6px;height:6px;border-radius:50%;background:#ffd700;animation:bounce 1.2s infinite}
.dot:nth-child(2){animation-delay:.2s}
.dot:nth-child(3){animation-delay:.4s}
@keyframes bounce{0%,80%,100%{transform:scale(0)}40%{transform:scale(1)}}

/* Modal */
.modal-overlay{position:fixed;inset:0;z-index:50;background:rgba(0,0,0,0.8);display:flex;align-items:flex-end;justify-content:center}
@media(min-width:640px){.modal-overlay{align-items:center;padding:16px}}
.modal{width:100%;max-width:480px;background:#001640;border-radius:20px 20px 0 0;border:1px solid #003080;border-bottom:none;box-shadow:0 25px 50px rgba(0,0,0,.7);max-height:90vh;display:flex;flex-direction:column}
@media(min-width:640px){.modal{border-radius:20px;border-bottom:1px solid #003080}}
.modal-header{display:flex;align-items:center;justify-content:space-between;padding:16px 20px;border-bottom:1px solid #002060}
.modal-title{font-weight:700;font-size:15px;color:#ffd700}
.modal-close{background:none;color:#6677aa;font-size:20px;line-height:1;padding:2px 6px}
.modal-body{overflow-y:auto;flex:1;padding:20px}
.field{margin-bottom:12px}
.field label{font-size:11px;color:#8899cc;display:block;margin-bottom:4px;font-weight:500}
.field input,.field select{width:100%;background:#002060;border:1px solid #003080;border-radius:10px;padding:10px 12px;color:#e8eaf0;font-size:13px;transition:border-color .2s}
.field input:focus,.field select:focus{border-color:#ffd700}
.field select option{background:#001640}
.field-row{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.barkod-row{display:flex;gap:8px}
.barkod-row input{flex:1}
.btn-uret{background:#ffd700;color:#001f5b;font-size:11px;font-weight:700;padding:10px 12px;border-radius:10px;white-space:nowrap}
.field-hint{font-size:10px;color:#334466;margin-top:3px}
.barkod-preview{background:#000;border:1px solid #002060;border-radius:12px;padding:14px;display:flex;flex-direction:column;align-items:center;gap:8px;margin-bottom:12px}
.modal-actions{display:flex;gap:8px;margin-top:4px}
.btn-sil{flex:1;padding:12px;border-radius:12px;border:1px solid #7f1d1d;color:#fca5a5;background:none;font-size:13px;font-weight:500}
.btn-kaydet{flex:1;padding:12px;border-radius:12px;background:#ffd700;color:#001f5b;font-weight:700;font-size:13px}
.secim-btn{width:100%;padding:16px;border-radius:14px;margin-bottom:10px;font-size:15px;font-weight:700;border:2px solid transparent;display:flex;align-items:center;justify-content:center;gap:10px;transition:all .2s}
.secim-satis{background:#002060;border-color:#ffd700;color:#ffd700}
.secim-alim{background:#002060;border-color:#4ade80;color:#4ade80}
.secim-ekle{background:#002060;border-color:#8899cc;color:#8899cc}

/* Notification */
.notif{position:fixed;top:16px;left:50%;transform:translateX(-50%);z-index:100;padding:10px 18px;border-radius:12px;font-size:13px;font-weight:500;white-space:nowrap;box-shadow:0 8px 32px rgba(0,0,0,.4);animation:slideDown .3s ease}
@keyframes slideDown{from{transform:translateX(-50%) translateY(-20px);opacity:0}to{transform:translateX(-50%) translateY(0);opacity:1}}
.notif-ok{background:#059669;color:#fff}
.notif-hata{background:#dc2626;color:#fff}
.notif-uyari{background:#d97706;color:#fff}

.section-title{padding:14px 16px 8px;font-size:12px;font-weight:700;color:#ffd700;text-transform:uppercase;letter-spacing:1px}
.divider{height:1px;background:#002060;margin:8px 16px}
</style>
</head>
<body>
<div id="app">
  <header>
    <div class="header-left">
      <div class="logo">⚙</div>
      <div class="header-info">
        <h1>HırdavatPRO 💛💙</h1>
        <p>Stok Yönetimi</p>
      </div>
    </div>
    <div class="header-right">
      <button class="btn-uyari" id="btnUyariHeader" style="display:none" onclick="setSekme('uyari')"></button>
      <button class="btn-barkod-tara" onclick="kameraModal()">📷 Barkod</button>
    </div>
  </header>

  <div class="stats" id="statsArea"></div>

  <div class="tabs">
    <button class="tab active" data-tab="stok" onclick="setSekme('stok')">📦 Stok</button>
    <button class="tab" data-tab="satis" onclick="setSekme('satis')">💳 Satış</button>
    <button class="tab" data-tab="rapor" onclick="setSekme('rapor')">📊 Rapor</button>
    <button class="tab" data-tab="gecmis" onclick="setSekme('gecmis')">📋 Geçmiş</button>
    <button class="tab" data-tab="veresiye" onclick="setSekme('veresiye')">📒 Veresiye</button>
    <button class="tab" data-tab="sayim" onclick="setSekme('sayim')">🔢 Sayım</button>
    <button class="tab" data-tab="uyari" onclick="setSekme('uyari')">🔴 Uyarı</button>
    <button class="tab" data-tab="ai" onclick="setSekme('ai')">🤖 Asistan</button>
  </div>

  <main id="main"></main>
</div>

<div class="modal-overlay" id="modalOverlay" style="display:none" onclick="modalOverlayClick(event)">
  <div class="modal" id="modal">
    <div class="modal-header">
      <span class="modal-title" id="modalTitle"></span>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-body" id="modalBody"></div>
  </div>
</div>

<div class="notif" id="notif" style="display:none"></div>

<script>
// ─── Sabitler ────────────────────────────────────────────────────────────────
const KATEGORILER = ["Vida & Somun","Boru & Rekor","Elektrik","Boya & Kimya","El Aletleri","Yapı Malzemeleri","Hırdavat","Diğer"];
const FB_URL = "https://bogazicihirdavat-4b8c8-default-rtdb.firebaseio.com";

const ORNEK = [
  {id:"1",barkod:"8690504001015",ad:"M8 Flanşlı Somun",kategori:"Vida & Somun",birim:"adet",fiyat:2.5,gelisFiyat:1.5,stok:240,minStok:50,aciklama:"Galvanizli, M8"},
  {id:"2",barkod:"8690504002012",ad:'3/4" Küresel Vana',kategori:"Boru & Rekor",birim:"adet",fiyat:85,gelisFiyat:55,stok:18,minStok:10,aciklama:"Pirinç gövde"},
  {id:"3",barkod:"8690504003019",ad:"2.5mm NYA Kablo",kategori:"Elektrik",birim:"metre",fiyat:4.8,gelisFiyat:3,stok:8,minStok:20,aciklama:"Kırmızı, 100m rulo"},
];

// ─── Firebase ────────────────────────────────────────────────────────────────
async function fbOku(yol){
  try{const r=await fetch(FB_URL+"/"+yol+".json");const d=await r.json();return d;}
  catch{return null;}
}
async function fbYaz(yol,veri){
  try{await fetch(FB_URL+"/"+yol+".json",{method:"PUT",body:JSON.stringify(veri)});}
  catch(e){}
}

// ─── Veri ────────────────────────────────────────────────────────────────────
let urunler=[], satislar=[], veresiyeler=[], yuklendi=false;

async function veriYukle(){
  goster("Veriler yükleniyor...","uyari");
  const u=await fbOku("urunler");
  const s=await fbOku("satislar");
  const v=await fbOku("veresiyeler");
  urunler = (u&&Array.isArray(u)&&u.length>0) ? u : ORNEK;
  satislar = (s&&Array.isArray(s)) ? s : [];
  veresiyeler = (v&&Array.isArray(v)) ? v : [];
  yuklendi=true;
  renderMain();
  goster("Veriler yüklendi ✓");
}
function saveUrunler(){fbYaz("urunler",urunler);}
function saveSatislar(){fbYaz("satislar",satislar);}
function saveVeresiyeler(){fbYaz("veresiyeler",veresiyeler);}

// ─── EAN-13 ─────────────────────────────────────────────────────────────────
const EL=["0001101","0011001","0010011","0111101","0100011","0110001","0101111","0111011","0110111","0001011"];
const EG=["0100111","0110011","0011011","0100001","0011101","0111001","0000101","0010001","0001001","0010111"];
const ER=["1110010","1100110","1101100","1000010","1011100","1001110","1010000","1000100","1001000","1110100"];
const EP=["LLLLLL","LLGLGG","LLGGLG","LLGGGL","LGLLGG","LGGLLG","LGGGLL","LGLGLG","LGLGGL","LGGLGL"];
function ean13Check(d12){const s=d12.split("").reduce((a,d,i)=>a+parseInt(d)*(i%2===0?1:3),0);return((10-(s%10))%10).toString();}
function uretBarkod(){const o=Array.from({length:9},()=>Math.floor(Math.random()*10)).join("");const b="869"+o;return b+ean13Check(b);}
function encodeEAN13(code){
  if(code.length!==13)return null;
  const d=code.split("").map(Number);
  const p=EP[d[0]];let bits="101";
  for(let i=0;i<6;i++)bits+=p[i]==="L"?EL[d[i+1]]:EG[d[i+1]];
  bits+="01010";
  for(let i=7;i<13;i++)bits+=ER[d[i]];
  return bits+"101";
}
function barkodSVG(kod,ad,w,h){
  w=w||280;h=h||100;
  const bits=encodeEAN13(kod);
  if(!bits)return'<p style="color:#ef4444;font-size:12px">Geçersiz barkod</p>';
  const bw=(w-20)/bits.length;
  let rects=bits.split("").map((b,i)=>b==="1"?`<rect x="${10+i*bw}" y="0" width="${bw+0.3}" height="${h-20}" fill="#fff"/>`:"").join("");
  const adT=ad?`<text x="${w/2}" y="${h-16}" text-anchor="middle" fill="#aaa" font-size="8" font-family="sans-serif">${ad.slice(0,30)}</text>`:"";
  return`<svg width="${w}" height="${h}" style="background:#000;border-radius:8px;display:block"><rect width="${w}" height="${h}" fill="#000"/>${rects}${adT}<text x="${w/2}" y="${h-4}" text-anchor="middle" fill="#fff" font-size="10" font-family="monospace" letter-spacing="2">${kod}</text></svg>`;
}

// ─── Yardımcı ────────────────────────────────────────────────────────────────
function para(f){return new Intl.NumberFormat("tr-TR",{style:"currency",currency:"TRY"}).format(f||0);}
function tarih(d){return new Date(d).toLocaleDateString("tr-TR",{day:"2-digit",month:"short",year:"numeric",hour:"2-digit",minute:"2-digit"});}
function bugunMu(d){return new Date(d).toDateString()===new Date().toDateString();}
function haftaMi(d){const now=new Date();const w=new Date(d);return(now-w)<=7*24*3600*1000;}
function ayMi(d){const now=new Date();const w=new Date(d);return w.getMonth()===now.getMonth()&&w.getFullYear()===now.getFullYear();}
let notifTimer=null;
function goster(msg,tip="ok"){
  const el=document.getElementById("notif");
  el.textContent=msg;el.className="notif notif-"+tip;el.style.display="block";
  if(notifTimer)clearTimeout(notifTimer);
  notifTimer=setTimeout(()=>el.style.display="none",2800);
}

// ─── Stats ───────────────────────────────────────────────────────────────────
function guncelleStats(){
  const dusuk=urunler.filter(u=>u.stok<=u.minStok);
  const bugunSatislar=satislar.filter(s=>bugunMu(s.tarih));
  const bugunCiro=bugunSatislar.reduce((t,s)=>t+s.toplam,0);
  const bugunKar=bugunSatislar.reduce((t,s)=>t+(s.kar||0),0);
  const veresiyeToplam=veresiyeler.filter(v=>!v.odendi).reduce((t,v)=>t+v.tutar,0);
  document.getElementById("statsArea").innerHTML=`
    <div class="stat-card"><div class="stat-icon">📦</div><div class="stat-val">${urunler.length}</div><div class="stat-label">Toplam Ürün</div></div>
    <div class="stat-card"><div class="stat-icon">⚠️</div><div class="stat-val danger">${dusuk.length}</div><div class="stat-label">Düşük Stok</div></div>
    <div class="stat-card"><div class="stat-icon">💰</div><div class="stat-val yellow">${para(bugunCiro)}</div><div class="stat-label">Bugün Ciro</div></div>
    <div class="stat-card"><div class="stat-icon">📈</div><div class="stat-val green">${para(bugunKar)}</div><div class="stat-label">Bugün Kâr</div></div>
    ${veresiyeToplam>0?`<div class="stat-card" style="grid-column:span 2"><div class="stat-icon">📒</div><div class="stat-val danger">${para(veresiyeToplam)}</div><div class="stat-label">Ödenmemiş Veresiye</div></div>`:""}
  `;
  const btn=document.getElementById("btnUyariHeader");
  if(dusuk.length>0){btn.style.display="block";btn.textContent="⚠ "+dusuk.length;}
  else btn.style.display="none";
  document.querySelector('[data-tab="uyari"]').textContent=`🔴 Uyarı${dusuk.length?" ("+dusuk.length+")":""}`;
}

// ─── Tabs ────────────────────────────────────────────────────────────────────
let sekme="stok", arama="", katFiltre="Tümü", satisTip="nakit";
function setSekme(s){
  sekme=s;
  document.querySelectorAll(".tab").forEach(t=>t.classList.toggle("active",t.dataset.tab===s));
  renderMain();
}

// ─── Render ──────────────────────────────────────────────────────────────────
function renderMain(){
  guncelleStats();
  const el=document.getElementById("main");
  if(sekme==="stok") el.innerHTML=renderStok();
  else if(sekme==="satis") el.innerHTML=renderSatis();
  else if(sekme==="rapor") el.innerHTML=renderRapor();
  else if(sekme==="gecmis") el.innerHTML=renderGecmis();
  else if(sekme==="veresiye") el.innerHTML=renderVeresiye();
  else if(sekme==="sayim") el.innerHTML=renderSayim();
  else if(sekme==="uyari") el.innerHTML=renderUyari();
  else if(sekme==="ai") el.innerHTML=renderAI();
}

// ─── STOK ─────────────────────────────────────────────────────────────────────
function renderStok(){
  const filtreli=urunler.filter(u=>{
    const a=!arama||u.ad.toLowerCase().includes(arama.toLowerCase())||u.barkod.includes(arama)||(u.kategori||"").toLowerCase().includes(arama.toLowerCase());
    const k=katFiltre==="Tümü"||u.kategori===katFiltre;
    return a&&k;
  });
  const toplamDeger=filtreli.reduce((t,u)=>t+u.fiyat*u.stok,0);
  const katBtns=["Tümü",...KATEGORILER].map(k=>`<button class="cat-btn${k===katFiltre?" active":""}" onclick="setKat('${k}')">${k}</button>`).join("");
  const urunHTML=filtreli.length===0
    ?`<div class="empty"><div class="empty-icon">📭</div><div class="empty-text" style="color:#6677aa">Ürün bulunamadı</div></div>`
    :filtreli.map(u=>{
      const dusuk=u.stok<=u.minStok;
      const kar=u.gelisFiyat?(u.fiyat-u.gelisFiyat):0;
      const karYuzde=u.gelisFiyat?Math.round((kar/u.gelisFiyat)*100):0;
      return`<div class="urun-kart${dusuk?" dusuk":""}">
        <div class="urun-top" onclick="modalDuzenle('${u.id}')">
          <div style="flex:1;min-width:0;padding-right:8px">
            <div class="urun-ad">${u.ad}</div>
            <div class="urun-barkod mono">${u.barkod}</div>
          </div>
          <div>
            <div class="urun-fiyat">${para(u.fiyat)}<span>/${u.birim}</span></div>
            ${kar>0?`<div class="urun-kar">+%${karYuzde} kâr</div>`:""}
          </div>
        </div>
        <div class="urun-bottom">
          <div class="badges">
            <span class="badge badge-gray">${u.kategori}</span>
            ${dusuk?'<span class="badge badge-red">⚠ Düşük</span>':'<span class="badge badge-green">Stokta</span>'}
          </div>
          <div class="urun-stok-area">
            <button class="btn-barkod-icon" onclick="event.stopPropagation();modalBarkod('${u.id}')">📊</button>
            <div onclick="modalDuzenle('${u.id}')"><span class="urun-stok">${u.stok}</span><span class="urun-stok-min"> / min ${u.minStok} ${u.birim}</span></div>
          </div>
        </div>
        ${u.aciklama?`<div class="urun-aciklama">${u.aciklama}</div>`:""}
      </div>`;
    }).join("");
  return`
    <div class="toolbar"><input class="search-input" placeholder="Ürün, barkod veya kategori..." value="${arama}" oninput="setArama(this.value)"/></div>
    <div class="cats">${katBtns}</div>
    <div class="list-header"><span>${filtreli.length} ürün • <b>${para(toplamDeger)}</b></span><button class="btn-ekle" onclick="modalEkle()">+ Ekle</button></div>
    ${urunHTML}`;
}
function setArama(v){arama=v;renderMain();}
function setKat(k){katFiltre=k;renderMain();}

// ─── SATIŞ ───────────────────────────────────────────────────────────────────
function renderSatis(){
  const opts=urunler.filter(u=>u.stok>0).map(u=>`<option value="${u.id}">${u.ad} — ${para(u.fiyat)}/${u.birim} (stok:${u.stok})</option>`).join("");
  return`<div class="satis-form">
    <h3>💳 Hızlı Satış</h3>
    <div class="field"><label>Ürün</label><select id="satisUrun" onchange="satisHesapla()"><option value="">Ürün seçin...</option>${opts}</select></div>
    <div class="field"><label>Miktar</label><input type="number" id="satisMiktar" value="1" min="1" oninput="satisHesapla()"/></div>
    <label style="font-size:11px;color:#8899cc;font-weight:500;display:block;margin-bottom:6px">Ödeme Tipi</label>
    <div class="satis-tip-row">
      <button class="satis-tip-btn${satisTip==="nakit"?" active":""}" onclick="setSatisTip('nakit')">💵 Nakit</button>
      <button class="satis-tip-btn${satisTip==="pos"?" active":""}" onclick="setSatisTip('pos')">💳 POS</button>
      <button class="satis-tip-btn${satisTip==="veresiye"?" active":""}" onclick="setSatisTip('veresiye')">📒 Veresiye</button>
    </div>
    ${satisTip==="veresiye"?`<div class="field"><label>Müşteri Adı</label><input type="text" id="musteriAd" placeholder="Ad Soyad"/></div>`:""}
    <div class="tutar-box" id="satisTutar">Tutar: —</div>
    <button class="btn-satis" onclick="satisYap()">Satışı Kaydet</button>
  </div>`;
}
function setSatisTip(t){satisTip=t;renderMain();}
function satisHesapla(){
  const uid=document.getElementById("satisUrun")?.value;
  const m=parseFloat(document.getElementById("satisMiktar")?.value)||0;
  const u=urunler.find(x=>x.id===uid);
  const kar=u&&u.gelisFiyat?(u.fiyat-u.gelisFiyat)*m:0;
  document.getElementById("satisTutar").innerHTML=u&&m>0
    ?`Tutar: <b>${para(u.fiyat*m)}</b>${kar>0?` • Kâr: <span style="color:#4ade80">${para(kar)}</span>`:""}`
    :"Tutar: —";
}
function satisYap(){
  const uid=document.getElementById("satisUrun").value;
  const m=parseFloat(document.getElementById("satisMiktar").value)||0;
  const u=urunler.find(x=>x.id===uid);
  if(!u){goster("Ürün seçin!","hata");return;}
  if(m<=0){goster("Geçersiz miktar","hata");return;}
  if(u.stok<m){goster("Yetersiz stok!","hata");return;}
  if(satisTip==="veresiye"){
    const musteriAd=document.getElementById("musteriAd")?.value?.trim();
    if(!musteriAd){goster("Müşteri adı girin!","hata");return;}
    veresiyeler=[{id:Date.now().toString(),musteriAd,urunAd:u.ad,miktar:m,birim:u.birim,fiyat:u.fiyat,tutar:u.fiyat*m,tarih:new Date().toISOString(),odendi:false},...veresiyeler];
    saveVeresiyeler();
  }
  const kar=u.gelisFiyat?(u.fiyat-u.gelisFiyat)*m:0;
  urunler=urunler.map(x=>x.id===uid?{...x,stok:x.stok-m}:x);
  satislar=[{id:Date.now().toString(),urunId:u.id,urunAd:u.ad,miktar:m,birim:u.birim,fiyat:u.fiyat,toplam:u.fiyat*m,kar,tip:satisTip,tarih:new Date().toISOString()},...satislar];
  saveUrunler();saveSatislar();
  goster(`${u.ad} — ${m} ${u.birim} satıldı ✓`);
  renderMain();
}

// ─── RAPOR ───────────────────────────────────────────────────────────────────
function renderRapor(){
  const bugun=satislar.filter(s=>bugunMu(s.tarih));
  const hafta=satislar.filter(s=>haftaMi(s.tarih));
  const ay=satislar.filter(s=>ayMi(s.tarih));
  const ciro=(arr)=>arr.reduce((t,s)=>t+s.toplam,0);
  const kar=(arr)=>arr.reduce((t,s)=>t+(s.kar||0),0);
  const nakit=(arr)=>arr.filter(s=>s.tip==="nakit").reduce((t,s)=>t+s.toplam,0);
  const pos=(arr)=>arr.filter(s=>s.tip==="pos").reduce((t,s)=>t+s.toplam,0);
  const veresiyeT=(arr)=>arr.filter(s=>s.tip==="veresiye").reduce((t,s)=>t+s.toplam,0);

  // En çok satanlar
  const sayac={};
  satislar.forEach(s=>{sayac[s.urunAd]=(sayac[s.urunAd]||0)+s.miktar;});
  const enCok=Object.entries(sayac).sort((a,b)=>b[1]-a[1]).slice(0,5);

  // Sipariş listesi
  const siparis=urunler.filter(u=>u.stok<=u.minStok);

  return`
    <div class="section-title">📅 Satış Özeti</div>
    <div class="rapor-kart">
      <div class="rapor-baslik">Bugün</div>
      <div class="rapor-row"><span class="rapor-label">Ciro</span><span class="rapor-val yellow">${para(ciro(bugun))}</span></div>
      <div class="rapor-row"><span class="rapor-label">Kâr</span><span class="rapor-val green">${para(kar(bugun))}</span></div>
      <div class="rapor-row"><span class="rapor-label">Nakit</span><span class="rapor-val">${para(nakit(bugun))}</span></div>
      <div class="rapor-row"><span class="rapor-label">POS</span><span class="rapor-val">${para(pos(bugun))}</span></div>
      <div class="rapor-row"><span class="rapor-label">Veresiye</span><span class="rapor-val">${para(veresiyeT(bugun))}</span></div>
    </div>
    <div class="rapor-kart">
      <div class="rapor-baslik">Bu Hafta</div>
      <div class="rapor-row"><span class="rapor-label">Ciro</span><span class="rapor-val yellow">${para(ciro(hafta))}</span></div>
      <div class="rapor-row"><span class="rapor-label">Kâr</span><span class="rapor-val green">${para(kar(hafta))}</span></div>
      <div class="rapor-row"><span class="rapor-label">Satış Adedi</span><span class="rapor-val">${hafta.length}</span></div>
    </div>
    <div class="rapor-kart">
      <div class="rapor-baslik">Bu Ay</div>
      <div class="rapor-row"><span class="rapor-label">Ciro</span><span class="rapor-val yellow">${para(ciro(ay))}</span></div>
      <div class="rapor-row"><span class="rapor-label">Kâr</span><span class="rapor-val green">${para(kar(ay))}</span></div>
      <div class="rapor-row"><span class="rapor-label">Satış Adedi</span><span class="rapor-val">${ay.length}</span></div>
    </div>
    ${enCok.length>0?`
    <div class="section-title">🏆 En Çok Satanlar</div>
    <div class="rapor-kart">
      ${enCok.map((e,i)=>`<div class="rapor-row"><span class="rapor-label">${i+1}. ${e[0]}</span><span class="rapor-val yellow">${e[1]} adet</span></div>`).join("")}
    </div>`:""}
    ${siparis.length>0?`
    <div class="section-title">📋 Sipariş Listesi</div>
    <div class="rapor-kart">
      ${siparis.map(u=>`<div class="rapor-row"><span class="rapor-label">${u.ad}</span><span class="rapor-val danger">Stok: ${u.stok} / Min: ${u.minStok}</span></div>`).join("")}
    </div>`:""}
  `;
}

// ─── GEÇMİŞ ──────────────────────────────────────────────────────────────────
function renderGecmis(){
  if(satislar.length===0)return`<div class="gecmis-header"><h3>Satış Geçmişi</h3></div><div class="empty"><div class="empty-icon">📋</div></div>`;
  const tipBadge={nakit:'<span class="satis-tip-badge tip-nakit">💵 Nakit</span>',pos:'<span class="satis-tip-badge tip-pos">💳 POS</span>',veresiye:'<span class="satis-tip-badge tip-veresiye">📒 Veresiye</span>'};
  return`<div class="gecmis-header"><h3>Satış Geçmişi</h3><span>${satislar.length} kayıt</span></div>
    ${satislar.map(s=>`<div class="satis-kart">
      <div><div class="satis-ad">${s.urunAd}</div><div class="satis-tarih">${tarih(s.tarih)}</div>${tipBadge[s.tip]||""}</div>
      <div><div class="satis-tutar">${para(s.toplam)}</div><div class="satis-detay">${s.miktar} ${s.birim} × ${para(s.fiyat)}</div>${s.kar>0?`<div class="satis-detay" style="color:#4ade80">Kâr: ${para(s.kar)}</div>`:""}</div>
    </div>`).join("")}`;
}

// ─── VERESİYE ─────────────────────────────────────────────────────────────────
function renderVeresiye(){
  const bekleyen=veresiyeler.filter(v=>!v.odendi);
  const odenen=veresiyeler.filter(v=>v.odendi);
  const toplamBekleyen=bekleyen.reduce((t,v)=>t+v.tutar,0);
  return`
    <div class="gecmis-header"><h3>📒 Veresiye Defteri</h3><span style="color:#ff8888;font-weight:700">${para(toplamBekleyen)}</span></div>
    ${bekleyen.length===0?'<div class="empty"><div class="empty-icon">✅</div><div style="color:#6677aa;font-size:13px">Ödenmemiş veresiye yok</div></div>':""}
    ${bekleyen.map(v=>`<div class="veresiye-kart odenmedi" onclick="veresiyeOde('${v.id}')">
      <div style="display:flex;justify-content:space-between;align-items:center">
        <div><div class="veresiye-ad">👤 ${v.musteriAd}</div><div style="font-size:12px;color:#8899cc;margin-top:2px">${v.urunAd} — ${v.miktar} ${v.birim}</div><div class="veresiye-tarih">${tarih(v.tarih)}</div></div>
        <div><div class="veresiye-tutar">${para(v.tutar)}</div><div style="font-size:10px;color:#fb923c;text-align:right;margin-top:4px">Ödendi mi? →</div></div>
      </div>
    </div>`).join("")}
    ${odenen.length>0?`<div class="section-title">✅ Ödenmiş</div>${odenen.map(v=>`<div class="veresiye-kart"><div style="display:flex;justify-content:space-between"><div><div class="veresiye-ad" style="color:#6677aa">👤 ${v.musteriAd}</div><div style="font-size:12px;color:#445588">${v.urunAd}</div></div><div class="veresiye-tutar odendi">${para(v.tutar)}</div></div></div>`).join("")}`:""}
  `;
}
function veresiyeOde(id){
  if(!confirm("Bu veresiye ödendi olarak işaretlensin mi?"))return;
  veresiyeler=veresiyeler.map(v=>v.id===id?{...v,odendi:true}:v);
  saveVeresiyeler();goster("Veresiye ödendi olarak işaretlendi ✓");renderMain();
}

// ─── SAYIM ───────────────────────────────────────────────────────────────────
let sayimVeri={};
function renderSayim(){
  return`
    <div class="gecmis-header"><h3>🔢 Stok Sayımı</h3><button class="btn-ekle" onclick="sayimiKaydet()">Kaydet</button></div>
    <div style="padding:0 16px 10px;font-size:12px;color:#6677aa">Gerçek stok miktarlarını girin, sistemi güncelleyin.</div>
    ${urunler.map(u=>`<div class="sayim-kart">
      <div class="sayim-ad">${u.ad}<div style="font-size:10px;color:#445588">${u.kategori}</div></div>
      <span class="sayim-mevcut">Sistem: ${u.stok}</span>
      <input type="number" class="sayim-input" placeholder="${u.stok}" id="sayim_${u.id}" min="0" value="${sayimVeri[u.id]||""}"/>
    </div>`).join("")}
  `;
}
function sayimiKaydet(){
  let degisen=0;
  urunler=urunler.map(u=>{
    const el=document.getElementById("sayim_"+u.id);
    if(el&&el.value!==""){
      const yeniStok=parseFloat(el.value);
      if(yeniStok!==u.stok){degisen++;return{...u,stok:yeniStok};}
    }
    return u;
  });
  sayimVeri={};
  if(degisen>0){saveUrunler();goster(`${degisen} ürün güncellendi ✓`);renderMain();}
  else goster("Değişiklik yapılmadı","uyari");
}

// ─── UYARI ────────────────────────────────────────────────────────────────────
function renderUyari(){
  const dusuk=urunler.filter(u=>u.stok<=u.minStok);
  if(dusuk.length===0)return`<div class="uyari-header"><h3 style="color:#e8eaf0">✅ Tüm ürünler yeterli stokta</h3></div>`;
  return`<div class="uyari-header"><div class="pulse"></div><h3 style="color:#e8eaf0">${dusuk.length} ürün kritik</h3></div>
    ${dusuk.map(u=>{
      const oran=Math.min(100,Math.round(u.stok/u.minStok*100));
      return`<div class="uyari-kart" onclick="modalDuzenle('${u.id}')">
        <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px">
          <div><div style="font-weight:600;font-size:13px;color:#e8eaf0">${u.ad}</div><div style="font-size:11px;color:#6677aa">${u.kategori}</div></div>
          <div style="text-align:right"><div style="font-weight:700;font-size:20px;color:#ef4444">${u.stok}</div><div style="font-size:11px;color:#6677aa">min: ${u.minStok} ${u.birim}</div></div>
        </div>
        <div style="display:flex;justify-content:space-between;font-size:11px;color:#6677aa;margin-bottom:4px"><span>Stok oranı</span><span>${oran}%</span></div>
        <div class="progress-bar"><div class="progress-fill" style="width:${oran}%"></div></div>
      </div>`;
    }).join("")}`;
}

// ─── AI ───────────────────────────────────────────────────────────────────────
function renderAI(){
  return`<div class="ai-box">
    <div style="display:flex;align-items:center;gap:8px;margin-bottom:12px">
      <div class="ai-logo">AI</div>
      <div><div style="font-weight:700;font-size:13px;color:#ffd700">Stok Asistanı</div><div style="font-size:11px;color:#6677aa">Stok hakkında her şeyi sorabilirsiniz</div></div>
    </div>
    <div style="display:flex;flex-wrap:wrap;gap:6px;margin-bottom:12px">
      <button class="quick-btn" onclick="aiHizli('Düşük stoklu ürünler?')">Düşük stoklar?</button>
      <button class="quick-btn" onclick="aiHizli('En kârlı 5 ürün?')">En kârlı 5?</button>
      <button class="quick-btn" onclick="aiHizli('Bu ay ne kadar kazandım?')">Bu ay kazanç?</button>
      <button class="quick-btn" onclick="aiHizli('Sipariş vermem gereken ürünler?')">Sipariş listesi?</button>
    </div>
    <div style="display:flex;gap:8px">
      <input class="ai-input" id="aiSoru" placeholder="Sorunuzu yazın..." onkeydown="if(event.key==='Enter')aiGonder()"/>
      <button class="btn-ai-gonder" id="aiBtn" onclick="aiGonder()">→</button>
    </div>
  </div>
  <div id="aiYanitArea"></div>`;
}
function aiHizli(s){document.getElementById("aiSoru").value=s;aiGonder();}
async function aiGonder(){
  const soru=document.getElementById("aiSoru")?.value?.trim();
  if(!soru)return;
  const btn=document.getElementById("aiBtn");
  if(btn)btn.disabled=true;
  document.getElementById("aiYanitArea").innerHTML=`<div class="ai-loading"><div style="display:flex;gap:4px"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div><span style="font-size:13px;color:#6677aa">Yanıt hazırlanıyor...</span></div>`;
  try{
    const ozet=urunler.slice(0,20).map(u=>`${u.ad}(stok:${u.stok},min:${u.minStok},fiyat:${u.fiyat}₺,gelis:${u.gelisFiyat||0}₺)`).join(";");
    const ayKar=satislar.filter(s=>ayMi(s.tarih)).reduce((t,s)=>t+(s.kar||0),0);
    const res=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:800,system:`Sen bir hırdavat dükkanı stok asistanısın. Kısa, net Türkçe yanıtlar ver. Ürünler: ${ozet}. Bu ay toplam kâr: ${ayKar}₺`,messages:[{role:"user",content:soru}]})});
    const d=await res.json();
    const yanit=d.content?.[0]?.text||"Yanıt alınamadı.";
    document.getElementById("aiYanitArea").innerHTML=`<div class="ai-yanit"><div style="font-size:11px;font-weight:600;color:#ffd700;margin-bottom:6px">🤖 Asistan</div><div style="font-size:13px;color:#e8eaf0;line-height:1.6;white-space:pre-wrap">${yanit.replace(/</g,"&lt;")}</div></div>`;
  }catch{
    document.getElementById("aiYanitArea").innerHTML=`<div class="ai-yanit"><div style="color:#ef4444;font-size:13px">Bağlantı hatası.</div></div>`;
  }
  if(btn)btn.disabled=false;
}

// ─── MODAL ───────────────────────────────────────────────────────────────────
function openModal(title,bodyHTML){
  document.getElementById("modalTitle").textContent=title;
  document.getElementById("modalBody").innerHTML=bodyHTML;
  document.getElementById("modalOverlay").style.display="flex";
}
function closeModal(){document.getElementById("modalOverlay").style.display="none";}
function modalOverlayClick(e){if(e.target===document.getElementById("modalOverlay"))closeModal();}

// Ürün formu
function urunFormHTML(f,tip){
  const barkodPreview=f.barkod&&f.barkod.length===13
    ?`<div class="barkod-preview">${barkodSVG(f.barkod,f.ad)}<div style="font-size:10px;color:#6677aa">Ekran görüntüsü → etiket</div></div>`:"";
  const katOpts=KATEGORILER.map(k=>`<option${k===f.kategori?" selected":""}>${k}</option>`).join("");
  const birimOpts=["adet","kg","metre","litre","paket","kutu","set","rulo"].map(b=>`<option${b===f.birim?" selected":""}>${b}</option>`).join("");
  return`
    <div class="field"><label>Barkod</label>
      <div class="barkod-row">
        <input type="text" id="fBarkod" value="${f.barkod||""}" placeholder="13 haneli" class="mono" oninput="formBarkodGuncelle()"/>
        <button class="btn-uret" onclick="formUretBarkod()">⚡ Üret</button>
      </div><div class="field-hint">869 ile başlayan EAN-13</div>
    </div>
    <div id="barkodPreviewArea">${barkodPreview}</div>
    <div class="field"><label>Ürün Adı *</label><input type="text" id="fAd" value="${f.ad||""}" placeholder="Örn: M10 Somun" oninput="formBarkodGuncelle()"/></div>
    <div class="field"><label>Kategori</label><select id="fKat">${katOpts}</select></div>
    <div class="field-row">
      <div class="field"><label>Geliş Fiyatı (₺)</label><input type="number" id="fGelisFiyat" value="${f.gelisFiyat||0}" min="0" step="0.01"/></div>
      <div class="field"><label>Satış Fiyatı (₺)</label><input type="number" id="fFiyat" value="${f.fiyat||0}" min="0" step="0.01"/></div>
    </div>
    <div class="field-row">
      <div class="field"><label>Birim</label><select id="fBirim">${birimOpts}</select></div>
      <div class="field"><label>Min. Stok</label><input type="number" id="fMinStok" value="${f.minStok||10}" min="0"/></div>
    </div>
    <div class="field"><label>Stok Miktarı</label><input type="number" id="fStok" value="${f.stok||0}" min="0"/></div>
    <div class="field"><label>Açıklama</label><input type="text" id="fAciklama" value="${f.aciklama||""}" placeholder="Opsiyonel"/></div>
    <div class="modal-actions">
      ${tip==="duzenle"?`<button class="btn-sil" onclick="silUrun('${f.id}')">Sil</button>`:""}
      <button class="btn-kaydet" onclick="kaydetUrun('${f.id||""}','${tip}')">${tip==="ekle"?"Ekle":"Güncelle"}</button>
    </div>`;
}
function formUretBarkod(){const kod=uretBarkod();document.getElementById("fBarkod").value=kod;formBarkodGuncelle();}
function formBarkodGuncelle(){
  const kod=document.getElementById("fBarkod")?.value||"";
  const ad=document.getElementById("fAd")?.value||"";
  const area=document.getElementById("barkodPreviewArea");
  if(area)area.innerHTML=kod.length===13?`<div class="barkod-preview">${barkodSVG(kod,ad)}<div style="font-size:10px;color:#6677aa">Ekran görüntüsü → etiket</div></div>`:"";
}
function modalEkle(){openModal("Yeni Ürün Ekle",urunFormHTML({barkod:uretBarkod(),kategori:KATEGORILER[0],birim:"adet",stok:0,minStok:10,fiyat:0,gelisFiyat:0},"ekle"));setTimeout(formBarkodGuncelle,50);}
function modalDuzenle(id){const u=urunler.find(x=>x.id===id);if(!u)return;openModal("Ürünü Düzenle",urunFormHTML(u,"duzenle"));}
function kaydetUrun(id,tip){
  const ad=document.getElementById("fAd").value.trim();
  if(!ad){goster("Ürün adı zorunlu!","hata");return;}
  const u={
    id:tip==="ekle"?Date.now().toString():id,
    barkod:document.getElementById("fBarkod").value,
    ad,kategori:document.getElementById("fKat").value,
    gelisFiyat:parseFloat(document.getElementById("fGelisFiyat").value)||0,
    fiyat:parseFloat(document.getElementById("fFiyat").value)||0,
    birim:document.getElementById("fBirim").value,
    stok:parseFloat(document.getElementById("fStok").value)||0,
    minStok:parseFloat(document.getElementById("fMinStok").value)||10,
    aciklama:document.getElementById("fAciklama").value,
  };
  if(tip==="ekle"){urunler=[u,...urunler];goster("Ürün eklendi ✓");}
  else{urunler=urunler.map(x=>x.id===id?u:x);goster("Ürün güncellendi ✓");}
  saveUrunler();closeModal();renderMain();
}
function silUrun(id){
  if(!confirm("Silinsin mi?"))return;
  urunler=urunler.filter(u=>u.id!==id);
  saveUrunler();goster("Ürün silindi","uyari");closeModal();renderMain();
}
function modalBarkod(id){
  const u=urunler.find(x=>x.id===id);if(!u)return;
  openModal("Barkod Etiketi",`<div style="display:flex;flex-direction:column;align-items:center;gap:16px;padding:8px 0">
    ${barkodSVG(u.barkod,u.ad,280,110)}
    <div style="text-align:center"><div style="font-weight:700;font-size:15px;color:#e8eaf0">${u.ad}</div><div style="font-size:13px;color:#6677aa;margin-top:4px">${para(u.fiyat)} / ${u.birim}</div></div>
    <div style="background:#001845;border:1px solid #003080;border-radius:10px;padding:10px 14px;font-size:11px;color:#6677aa;text-align:center;width:100%">📱 Ekran görüntüsü alarak yazdırabilirsiniz</div>
    <button onclick="closeModal();modalDuzenle('${u.id}')" style="width:100%;padding:10px;border-radius:12px;border:1px solid #003080;color:#8899cc;background:none;font-size:13px">✏️ Düzenle</button>
  </div>`);
}

// ─── BARKOD AKIŞI ────────────────────────────────────────────────────────────
function barkodBulundu(kod){
  const u=urunler.find(x=>x.barkod===kod);
  if(u){
    // Ürün var - ne yapacağız?
    openModal(`📷 ${u.ad}`,`
      <div style="text-align:center;padding:8px 0">
        <div style="font-size:13px;color:#8899cc;margin-bottom:6px">${u.kategori} • Stok: <b style="color:#ffd700">${u.stok} ${u.birim}</b></div>
        <div style="font-size:13px;color:#8899cc;margin-bottom:20px">Satış fiyatı: <b style="color:#ffd700">${para(u.fiyat)}</b></div>
        <button class="secim-btn secim-satis" onclick="closeModal();hizliSatis('${u.id}')">💳 Satış Yap</button>
        <button class="secim-btn secim-alim" onclick="closeModal();hizliAlim('${u.id}')">📦 Alım / Stok Ekle</button>
        <button class="secim-btn secim-ekle" onclick="closeModal();modalDuzenle('${u.id}')">✏️ Ürünü Düzenle</button>
      </div>`);
  } else {
    goster("Yeni ürün — barkod eklendi","uyari");
    modalEkle();
    setTimeout(()=>{const el=document.getElementById("fBarkod");if(el){el.value=kod;formBarkodGuncelle();}},100);
  }
}
function hizliSatis(id){
  const u=urunler.find(x=>x.id===id);if(!u)return;
  openModal(`💳 Satış — ${u.ad}`,`
    <div class="field"><label>Miktar (${u.birim})</label><input type="number" id="hsMiktar" value="1" min="1"/></div>
    <label style="font-size:11px;color:#8899cc;font-weight:500;display:block;margin-bottom:6px">Ödeme Tipi</label>
    <div class="satis-tip-row">
      <button class="satis-tip-btn active" id="hsTip_nakit" onclick="hsSecTip('nakit')">💵 Nakit</button>
      <button class="satis-tip-btn" id="hsTip_pos" onclick="hsSecTip('pos')">💳 POS</button>
      <button class="satis-tip-btn" id="hsTip_veresiye" onclick="hsSecTip('veresiye')">📒 Veresiye</button>
    </div>
    <div id="hsMusteriArea"></div>
    <button class="btn-satis" onclick="hizliSatisKaydet('${id}')">Satışı Kaydet</button>`);
}
let _hsTip="nakit";
function hsSecTip(t){
  _hsTip=t;
  ["nakit","pos","veresiye"].forEach(x=>document.getElementById("hsTip_"+x)?.classList.toggle("active",x===t));
  document.getElementById("hsMusteriArea").innerHTML=t==="veresiye"?'<div class="field"><label>Müşteri Adı</label><input type="text" id="hsMusteriAd" placeholder="Ad Soyad"/></div>':"";
}
function hizliSatisKaydet(id){
  const u=urunler.find(x=>x.id===id);if(!u)return;
  const m=parseFloat(document.getElementById("hsMiktar").value)||0;
  if(m<=0){goster("Geçersiz miktar","hata");return;}
  if(u.stok<m){goster("Yetersiz stok!","hata");return;}
  if(_hsTip==="veresiye"){
    const musteriAd=document.getElementById("hsMusteriAd")?.value?.trim();
    if(!musteriAd){goster("Müşteri adı girin!","hata");return;}
    veresiyeler=[{id:Date.now().toString(),musteriAd,urunAd:u.ad,miktar:m,birim:u.birim,fiyat:u.fiyat,tutar:u.fiyat*m,tarih:new Date().toISOString(),odendi:false},...veresiyeler];
    saveVeresiyeler();
  }
  const kar=u.gelisFiyat?(u.fiyat-u.gelisFiyat)*m:0;
  urunler=urunler.map(x=>x.id===id?{...x,stok:x.stok-m}:x);
  satislar=[{id:Date.now().toString(),urunId:u.id,urunAd:u.ad,miktar:m,birim:u.birim,fiyat:u.fiyat,toplam:u.fiyat*m,kar,tip:_hsTip,tarih:new Date().toISOString()},...satislar];
  saveUrunler();saveSatislar();
  goster(`${u.ad} — ${m} ${u.birim} satıldı ✓`);
  closeModal();renderMain();
}
function hizliAlim(id){
  const u=urunler.find(x=>x.id===id);if(!u)return;
  openModal(`📦 Alım — ${u.ad}`,`
    <div class="field"><label>Alınan Miktar (${u.birim})</label><input type="number" id="haMiktar" value="1" min="1"/></div>
    <div class="field"><label>Alış Fiyatı (₺/${u.birim})</label><input type="number" id="haFiyat" value="${u.gelisFiyat||0}" min="0" step="0.01"/></div>
    <div style="background:#002060;border-radius:10px;padding:10px 12px;margin-bottom:12px;font-size:12px;color:#8899cc">Mevcut stok: <b style="color:#ffd700">${u.stok} ${u.birim}</b></div>
    <button class="btn-satis" onclick="hizliAlimKaydet('${id}')">Alımı Kaydet</button>`);
}
function hizliAlimKaydet(id){
  const u=urunler.find(x=>x.id===id);if(!u)return;
  const m=parseFloat(document.getElementById("haMiktar").value)||0;
  const f=parseFloat(document.getElementById("haFiyat").value)||u.gelisFiyat||0;
  if(m<=0){goster("Geçersiz miktar","hata");return;}
  urunler=urunler.map(x=>x.id===id?{...x,stok:x.stok+m,gelisFiyat:f}:x);
  saveUrunler();
  goster(`${u.ad} — ${m} ${u.birim} eklendi ✓`);
  closeModal();renderMain();
}

// ─── KAMERA ──────────────────────────────────────────────────────────────────
let html5QrScanner=null;
async function kameraModal(){
  openModal("📷 Barkod Tara",`<div style="text-align:center">
    <div id="kameraYukleniyor" style="color:#8899cc;font-size:13px;margin-bottom:12px">⏳ Kamera başlatılıyor...</div>
    <div id="qr-reader" style="width:100%;border-radius:12px;overflow:hidden;display:none"></div>
    <div id="kameraHata" style="display:none;color:#ef4444;font-size:13px;padding:12px;background:rgba(127,29,29,0.2);border-radius:10px;margin-bottom:10px"></div>
    <button onclick="kameraKapat()" style="margin-top:14px;width:100%;padding:11px;border-radius:12px;border:1px solid #003080;color:#8899cc;background:none;font-size:13px">İptal / Manuel Gir</button>
  </div>`);
  if(!window.Html5Qrcode){
    await new Promise((res)=>{
      const s=document.createElement("script");
      s.src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js";
      s.onload=res;s.onerror=()=>{manuelKameraGiris();res();};
      document.head.appendChild(s);
    });
  }
  if(!window.Html5Qrcode){manuelKameraGiris();return;}
  try{
    html5QrScanner=new Html5Qrcode("qr-reader");
    document.getElementById("qr-reader").style.display="block";
    document.getElementById("kameraYukleniyor").style.display="none";
    await html5QrScanner.start(
      {facingMode:"environment"},{fps:10,qrbox:{width:250,height:150}},
      (kod)=>{kameraKapat(false);closeModal();barkodBulundu(kod);},
      ()=>{}
    );
  }catch(e){
    const ha=document.getElementById("kameraHata");
    if(ha){ha.style.display="block";ha.textContent="Kamera hatası: "+e;}
    document.getElementById("kameraYukleniyor").style.display="none";
    setTimeout(manuelKameraGiris,1500);
  }
}
function manuelKameraGiris(){
  kameraKapat(false);
  const body=document.getElementById("modalBody");if(!body)return;
  body.innerHTML=`<div style="text-align:center">
    <p style="font-size:13px;color:#8899cc;margin-bottom:14px">Barkodu manuel girin:</p>
    <div class="field"><input type="text" id="manuelBarkod" class="mono" placeholder="8690504001015" style="text-align:center;font-size:18px;letter-spacing:3px" autofocus/></div>
    <button onclick="manuelBarkodGir()" style="width:100%;padding:12px;border-radius:12px;background:#ffd700;color:#001f5b;font-weight:700;font-size:14px;margin-bottom:8px">Ara</button>
    <button onclick="closeModal()" style="width:100%;padding:11px;border-radius:12px;border:1px solid #003080;color:#8899cc;background:none;font-size:13px">İptal</button>
  </div>`;
}
function manuelBarkodGir(){
  const kod=document.getElementById("manuelBarkod")?.value?.trim();
  if(!kod){goster("Barkod girin","hata");return;}
  closeModal();barkodBulundu(kod);
}
async function kameraKapat(kapat=true){
  try{if(html5QrScanner&&html5QrScanner.isScanning)await html5QrScanner.stop();}catch(e){}
  html5QrScanner=null;
  if(kapat)closeModal();
}

// ─── Init ─────────────────────────────────────────────────────────────────────
renderMain();
veriYukle();
</script>
</body>
</html>
